# Map protocol command names to shell commands.
# Input fields are available as {{fieldName}} template variables.
# Each command must write valid JSON to stdout matching the protocol output schema.

[commands.list_projects]
run = "commands/list_projects.sh"

[commands.create_project]
run = "commands/create_project.sh '{{name}}' '{{repoUrl}}'"

[commands.list_sessions]
run = "commands/list_sessions.sh '{{projectId}}'"

[commands.create_session]
run = "commands/create_session.sh '{{projectId}}' '{{name}}'"

[commands.terminate_session]
run = "commands/terminate_session.sh '{{sessionId}}'"
